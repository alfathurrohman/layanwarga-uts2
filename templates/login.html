<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LayanWarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen py-10 px-4">

    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-600 mb-2">LayanWarga</h1>
            <p class="text-slate-500 text-sm">Masuk ke portal administrasi Anda</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition outline-none bg-slate-50 focus:bg-white" placeholder="Masukkan email Anda">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition outline-none bg-slate-50 focus:bg-white" placeholder="••••••••">
            </div>

            <button type="submit" id="btnSubmit" class="w-full py-3.5 px-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-md transform hover:-translate-y-0.5 transition duration-200">
                Masuk
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-600">
            Belum punya akun? <a href="/register" class="font-bold text-blue-600 hover:text-blue-800 hover:underline transition">Daftar di sini</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnSubmit = document.getElementById('btnSubmit');

            btnSubmit.innerText = "Memeriksa..."; 
            btnSubmit.disabled = true;

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    
                    const payload = JSON.parse(atob(data.token.split('.')[1]));
                    if (payload.role === 'admin') {
                        window.location.href = '/admin/dashboard';
                    } else {
                        window.location.href = '/dashboard';
                    }
                } else {
                    // Menampilkan error dengan SweetAlert2 agar lebih elegan
                    Swal.fire({
                        title: 'Login Gagal',
                        text: data.error || "Email atau password salah.",
                        icon: 'error',
                        confirmButtonColor: '#2563eb'
                    });
                }
            } catch (err) {
                Swal.fire('Error', 'Terjadi kesalahan jaringan.', 'error');
            } finally {
                btnSubmit.innerText = "Masuk"; 
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
