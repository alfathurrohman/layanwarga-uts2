<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - LayanWarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="bg-white/80 backdrop-blur-md fixed w-full z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="font-extrabold text-2xl text-blue-600 flex items-center gap-2">
                    <i class="fa-solid fa-building-columns"></i> LayanWarga
                </div>
                <div class="flex gap-4">
                    <a href="/login" class="text-slate-600 hover:text-blue-600 font-semibold px-4 py-2 transition duration-300">Masuk</a>
                    <a href="/register" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition duration-300">Daftar</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative text-center">
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight text-slate-900 mb-6">
                Urus Surat Pengantar <br class="hidden md:block" />
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">Lebih Cepat & Mudah</span>
            </h1>
            <p class="mt-4 max-w-2xl text-lg md:text-xl text-slate-500 mx-auto mb-10">
                Sistem administrasi digital terpadu untuk warga tingkat Kelurahan/Desa. Ajukan dokumen langsung dari rumah tanpa perlu antre panjang.
            </p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="/register" class="bg-blue-600 hover:bg-blue-700 text-white text-lg font-bold px-8 py-4 rounded-full shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition duration-300">
                    Mulai Ajukan Surat <i class="fa-solid fa-arrow-right ml-2"></i>
                </a>
                <a href="/login" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 text-lg font-bold px-8 py-4 rounded-full shadow-sm hover:shadow transition duration-300">
                    Cek Status Pengajuan
                </a>
            </div>
        </div>
    </div>

</body>
</html>
