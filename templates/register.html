<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - LayanWarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen py-10 px-4">

    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-600 mb-2">Buat Akun</h1>
            <p class="text-slate-500 text-sm">Daftar untuk mulai mengajukan surat secara digital</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label>
                <input type="text" id="nama_lengkap" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition outline-none bg-slate-50 focus:bg-white" placeholder="Sesuai KTP">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">NIK (Nomor Induk Kependudukan)</label>
                <input type="text" id="nik" required minlength="16" maxlength="16" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition outline-none bg-slate-50 focus:bg-white" placeholder="16 Digit NIK">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition outline-none bg-slate-50 focus:bg-white" placeholder="nama@email.com">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <input type="password" id="password" required minlength="6" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition outline-none bg-slate-50 focus:bg-white" placeholder="Minimal 6 karakter">
            </div>

            <button type="submit" id="btnSubmit" class="w-full py-3.5 px-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-md transform hover:-translate-y-0.5 transition duration-200">
                Daftar Sekarang
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-600">
            Sudah punya akun? <a href="/login" class="font-bold text-blue-600 hover:text-blue-800 hover:underline">Masuk di sini</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            const data = {
                nama_lengkap: document.getElementById('nama_lengkap').value,
                nik: document.getElementById('nik').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            btnSubmit.innerText = "Memproses..."; btnSubmit.disabled = true;

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    Swal.fire({
                        title: 'Registrasi Berhasil!',
                        text: 'Akun Anda telah dibuat. Silakan login.',
                        icon: 'success',
                        confirmButtonColor: '#2563eb'
                    }).then(() => {
                        window.location.href = '/login';
                    });
                } else {
                    Swal.fire('Gagal!', result.error || 'Terjadi kesalahan', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Kesalahan jaringan', 'error');
            } finally {
                btnSubmit.innerText = "Daftar Sekarang"; btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
