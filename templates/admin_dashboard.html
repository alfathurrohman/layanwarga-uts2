<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - LayanWarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <nav class="bg-slate-800 text-white shadow-xl border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="font-bold text-xl flex items-center gap-3">
                    <div class="bg-gradient-to-r from-red-500 to-rose-600 text-white text-xs px-3 py-1 rounded-full shadow-inner flex items-center gap-1">
                        <i class="fa-solid fa-shield-halved"></i> ADMIN
                    </div> 
                    LayanWarga
                </div>
                <button onclick="logout()" class="hover:text-red-400 font-medium transition duration-300 flex items-center gap-2">
                    <i class="fa-solid fa-right-from-bracket"></i> Keluar
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-100 bg-white flex justify-between items-center">
                <h2 class="text-xl font-extrabold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-list-check text-indigo-600"></i> Antrean Pengajuan Warga
                </h2>
                <button onclick="fetchPengajuan()" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-lg font-semibold transition flex items-center gap-2">
                    <i class="fa-solid fa-rotate-right"></i> Refresh
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Pemohon</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Detail Pengajuan</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Dokumen</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Aksi Kelola</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.role !== 'admin') window.location.href = '/dashboard';

        async function fetchPengajuan() {
            try {
                const response = await fetch('/api/pengajuan', { headers: { 'Authorization': `Bearer ${token}` } });
                const result = await response.json();
                if (response.ok) renderTable(result.data);
                else if (response.status === 401) logout();
            } catch (error) { console.error("Error:", error); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if(!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-gray-400"><i class="fa-solid fa-mug-hot text-4xl mb-3"></i><p>Antrean kosong, kerjaan selesai!</p></td></tr>';
                return;
            }

            data.forEach(item => {
                let statusBadge = '';
                if(item.Status === 'Pending') statusBadge = '<span class="bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded text-xs font-bold"><i class="fa-regular fa-clock"></i> Pending</span>';
                else if(item.Status === 'Diproses') statusBadge = '<span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-xs font-bold"><i class="fa-solid fa-spinner"></i> Diproses</span>';
                else if(item.Status === 'Selesai') statusBadge = '<span class="bg-green-100 text-green-800 px-2 py-0.5 rounded text-xs font-bold"><i class="fa-solid fa-check"></i> Selesai</span>';
                else statusBadge = '<span class="bg-red-100 text-red-800 px-2 py-0.5 rounded text-xs font-bold"><i class="fa-solid fa-xmark"></i> Ditolak</span>';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition duration-150">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center gap-3">
                                <div class="bg-slate-200 text-slate-600 w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg">
                                    ${item.User.NamaLengkap.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <div class="text-sm font-bold text-gray-900">${item.User.NamaLengkap}</div>
                                    <div class="text-xs text-gray-500 font-mono mt-0.5"><i class="fa-regular fa-id-badge"></i> ${item.User.NIK}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-sm text-gray-900 font-bold">${item.JenisSurat}</div>
                            <div class="text-xs text-gray-500 mt-1 mb-2">${item.Keperluan}</div>
                            <div>${statusBadge}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <div class="flex flex-col gap-2">
                                <a href="${item.FileKTPUrl}" target="_blank" class="text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-3 py-1 rounded text-xs font-semibold flex items-center gap-2 w-max transition"><i class="fa-solid fa-image"></i> Cek KTP</a> 
                                <a href="${item.FileKKUrl}" target="_blank" class="text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-3 py-1 rounded text-xs font-semibold flex items-center gap-2 w-max transition"><i class="fa-solid fa-image"></i> Cek KK</a>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg border border-gray-200 w-max">
                                <select id="status_${item.ID}" class="border-none bg-transparent text-sm font-semibold text-gray-700 focus:ring-0 cursor-pointer">
                                    <option value="Pending" ${item.Status==='Pending'?'selected':''}>Pending</option>
                                    <option value="Diproses" ${item.Status==='Diproses'?'selected':''}>Diproses</option>
                                    <option value="Selesai" ${item.Status==='Selesai'?'selected':''}>Selesai</option>
                                    <option value="Ditolak" ${item.Status==='Ditolak'?'selected':''}>Ditolak</option>
                                </select>
                                <div class="w-px h-6 bg-gray-300 mx-1"></div>
                                <button onclick="updateStatus(${item.ID})" class="text-blue-600 hover:text-blue-800 p-2 rounded-md hover:bg-blue-100 transition" title="Simpan Status"><i class="fa-solid fa-floppy-disk text-lg"></i></button>
                                <button onclick="hapusData(${item.ID})" class="text-red-600 hover:text-red-800 p-2 rounded-md hover:bg-red-100 transition" title="Hapus Data"><i class="fa-solid fa-trash-can text-lg"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        async function updateStatus(id) {
            const newStatus = document.getElementById(`status_${id}`).value;
            try {
                const response = await fetch(`/api/pengajuan/${id}/status`, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus, keterangan: "Diupdate oleh Admin" })
                });
                if (response.ok) {
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Status diperbarui', showConfirmButton: false, timer: 1500 });
                    fetchPengajuan(); 
                } else Swal.fire('Gagal', 'Tidak dapat mengubah status', 'error');
            } catch (error) { Swal.fire('Error', 'Kesalahan jaringan', 'error'); }
        }

        async function hapusData(id) {
            const result = await Swal.fire({
                title: 'Hapus Permanen?',
                text: "Data yang dihapus tidak dapat dipulihkan!",
                icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#6b7280', confirmButtonText: 'Ya, Hapus!'
            });
            if (result.isConfirmed) {
                try {
                    const response = await fetch(`/api/pengajuan/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                    if (response.ok) {
                        Swal.fire('Terhapus!', 'Data berhasil dihapus.', 'success');
                        fetchPengajuan();
                    } else Swal.fire('Gagal', 'Tidak dapat menghapus data.', 'error');
                } catch (error) { Swal.fire('Error', 'Kesalahan jaringan', 'error'); }
            }
        }

        function logout() { localStorage.removeItem('token'); window.location.href = '/login'; }
        fetchPengajuan();
    </script>
</body>
</html>
